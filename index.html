<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant — Internal POC</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* ─── Design Tokens ──────────────────────────────────────────── */
    :root {
      --bg:            #0B0E14;
      --surface-lo:    #0f1218;
      --surface:       #151921;
      --surface-hi:    #1c212b;
      --surface-top:   #242a35;
      --surface-pure:  #080a0f;
      --on-surface:    #f8f9fa;
      --on-surface-2:  #abb3b7;
      --primary:       #5856D6;
      --primary-dim:   #423fc0;
      --on-primary:    #faf6ff;
      --sec-cnt:       #1c212b;
      --on-sec-cnt:    #d9e3f6;
      --outline:       #586064;
      --outline-var:   #2b3437;
      --error:         #ff8b9a;
      --hr-bg:         #0d2012; --hr-fg:   #4ade80; --hr-border: #166534;
      --ac-bg:         #0d0d1f; --ac-fg:   #818cf8; --ac-border: #3730a3;
      --mg-bg:         #1a0d1a; --mg-fg:   #e879f9; --mg-border: #7e22ce;
    }
    body.light-mode {
      --bg:            #f8f9fa;
      --surface-lo:    #f1f4f6;
      --surface:       #eaeff1;
      --surface-hi:    #e2e9ec;
      --surface-top:   #dbe4e7;
      --surface-pure:  #ffffff;
      --on-surface:    #2b3437;
      --on-surface-2:  #586064;
      --primary:       #4f4ccd;
      --primary-dim:   #3d3ab8;
      --on-primary:    #faf6ff;
      --sec-cnt:       #d9e3f6;
      --on-sec-cnt:    #485262;
      --outline:       #737c7f;
      --outline-var:   #c5cdd0;
      --error:         #9e3f4e;
      --hr-bg:         #f0fdf4; --hr-fg:   #166534; --hr-border: #86efac;
      --ac-bg:         #eef2ff; --ac-fg:   #3730a3; --ac-border: #c7d2fe;
      --mg-bg:         #fdf4ff; --mg-fg:   #7e22ce; --mg-border: #d8b4fe;
    }

    /* ─── Base ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--on-surface);
      display: flex;
      height: 100vh;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      font-size: 20px;
      line-height: 1;
      user-select: none;
    }

    /* ─── Sidebar ────────────────────────────────────────────────── */
    .sidebar {
      width: 256px;
      height: 100vh;
      position: fixed;
      left: 0; top: 0;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 40;
      transition: background 0.3s;
    }

    /* Brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 24px 20px 20px;
    }
    .brand-icon {
      width: 40px; height: 40px;
      background: var(--primary);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: var(--on-primary);
      font-size: 18px;
      flex-shrink: 0;
    }
    .brand-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--on-surface);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }
    .brand-sub {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--on-surface-2);
      opacity: 0.6;
      margin-top: 2px;
    }

    /* Sidebar body */
    .sidebar-body {
      flex: 1;
      padding: 8px 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sidebar-body::-webkit-scrollbar { width: 3px; }
    .sidebar-body::-webkit-scrollbar-track { background: transparent; }
    .sidebar-body::-webkit-scrollbar-thumb { background: var(--outline-var); border-radius: 10px; }

    .section-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--on-surface-2);
      opacity: 0.5;
      padding: 12px 8px 6px;
    }

    /* Agent Badge */
    .agent-badge {
      display: none;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
      margin-bottom: 4px;
      transition: all 0.3s;
    }
    .agent-badge.agent-hr      { background: var(--hr-bg); color: var(--hr-fg); box-shadow: inset 0 0 0 1px var(--hr-border); }
    .agent-badge.agent-accounting { background: var(--ac-bg); color: var(--ac-fg); box-shadow: inset 0 0 0 1px var(--ac-border); }
    .agent-badge.agent-manager { background: var(--mg-bg); color: var(--mg-fg); box-shadow: inset 0 0 0 1px var(--mg-border); }

    /* Nav items */
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--on-surface-2);
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s, background 0.2s, transform 0.25s cubic-bezier(.4,0,.2,1);
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      font-family: 'Inter', 'Sarabun', sans-serif;
    }
    .nav-item:hover {
      color: var(--on-surface);
      background: var(--surface-hi);
      transform: translateX(3px);
    }
    .nav-item .nav-icon { font-size: 15px; opacity: 0.75; }

    /* Sidebar footer */
    .sidebar-footer {
      padding: 12px 12px 20px;
      border-top: 1px solid rgba(255,255,255,0.04);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    body.light-mode .sidebar-footer { border-top-color: var(--outline-var); }

    .theme-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--on-surface-2);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: color 0.2s, background 0.2s, transform 0.25s;
      width: 100%;
      text-align: left;
      font-family: 'Inter', 'Sarabun', sans-serif;
    }
    .theme-btn:hover { color: var(--on-surface); background: var(--surface-hi); transform: translateX(3px); }

    .model-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      font-size: 11px;
      color: var(--on-surface-2);
      opacity: 0.6;
    }
    .model-pill .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }
    #modelName { font-family: 'Inter', monospace; font-size: 10px; }

    .poc-warning {
      font-size: 10px;
      color: var(--on-surface-2);
      opacity: 0.35;
      padding: 4px 12px;
      line-height: 1.5;
    }

    /* ─── Main ───────────────────────────────────────────────────── */
    .main {
      flex: 1;
      margin-left: 256px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ─── Navbar ─────────────────────────────────────────────────── */
    .navbar {
      position: fixed;
      top: 0; left: 256px; right: 0;
      height: 60px;
      z-index: 50;
      background: color-mix(in srgb, var(--bg) 80%, transparent);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      transition: background 0.3s;
    }
    .navbar-left {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    .app-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--primary);
    }
    .app-desc {
      font-size: 11px;
      color: var(--on-surface-2);
      opacity: 0.5;
      letter-spacing: 0.05em;
    }
    .navbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .version-tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--on-surface-2);
      opacity: 0.4;
      padding: 3px 8px;
      border-radius: 99px;
      background: var(--surface-hi);
    }

    /* ─── Output ─────────────────────────────────────────────────── */
    .output-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 80px 48px 0;
      transition: background 0.3s;
    }
    .output-wrap::-webkit-scrollbar { width: 4px; }
    .output-wrap::-webkit-scrollbar-track { background: transparent; }
    .output-wrap::-webkit-scrollbar-thumb { background: var(--outline-var); border-radius: 10px; }

    .output-container {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 0 200px;
      display: flex;
      gap: 20px;
    }

    .ai-accent-line {
      width: 3px;
      min-height: 40px;
      border-radius: 4px;
      background: var(--primary);
      opacity: 0;
      flex-shrink: 0;
      transition: opacity 0.4s;
      align-self: stretch;
    }
    .streaming .ai-accent-line { opacity: 1; }

    .output-area {
      flex: 1;
      font-size: 14px;
      font-family: 'Inter', 'Sarabun', sans-serif;
      line-height: 1.9;
      white-space: pre-wrap;
      color: var(--on-surface);
      min-height: 100px;
    }

    /* ─── Markdown Styles ────────────────────────────────────────── */
    .output-area.md-rendered { white-space: normal; }
    .output-area h1 { font-size: 1.4rem; font-weight: 700; margin: 1.2em 0 0.4em; color: var(--on-surface); }
    .output-area h2 { font-size: 1.15rem; font-weight: 600; margin: 1em 0 0.3em; color: var(--on-surface); }
    .output-area h3 { font-size: 1rem; font-weight: 600; margin: 0.8em 0 0.2em; color: var(--on-surface); }
    .output-area p { margin: 0.5em 0; }
    .output-area strong { font-weight: 700; color: var(--on-surface); }
    .output-area em { font-style: italic; }
    .output-area ul, .output-area ol { padding-left: 1.6em; margin: 0.4em 0; }
    .output-area li { margin: 0.15em 0; }
    .output-area blockquote {
      border-left: 3px solid var(--primary);
      margin: 0.6em 0; padding: 4px 12px;
      color: var(--on-surface-2);
    }
    .output-area code {
      background: var(--surface-hi);
      padding: 1px 6px; border-radius: 4px;
      font-size: 0.85em; font-family: 'Courier New', monospace;
    }
    .output-area pre {
      background: var(--surface-hi);
      padding: 12px 16px; border-radius: 8px;
      overflow-x: auto; margin: 0.6em 0;
    }
    .output-area pre code { background: none; padding: 0; }
    .output-area table { border-collapse: collapse; width: 100%; margin: 0.8em 0; }
    .output-area th {
      font-weight: 600; text-align: left;
      padding: 7px 12px;
      border-bottom: 2px solid var(--surface-top);
      color: var(--on-surface);
    }
    .output-area td {
      padding: 6px 12px;
      border-bottom: 1px solid var(--surface-hi);
      color: var(--on-surface);
    }
    .output-area hr { border: none; border-top: 1px solid var(--surface-hi); margin: 1em 0; }
    .placeholder {
      color: var(--on-surface-2);
      opacity: 0.35;
      font-style: italic;
      font-size: 14px;
    }
    .error-msg { color: var(--error); }

    /* ─── Input Footer ───────────────────────────────────────────── */
    .input-footer {
      position: fixed;
      bottom: 0; left: 256px; right: 0;
      padding: 0 48px 24px;
      background: linear-gradient(to top, var(--bg) 60%, transparent);
      pointer-events: none;
    }

    .input-inner {
      max-width: 760px;
      margin: 0 auto;
      pointer-events: auto;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px 8px;
      min-height: 28px;
      background: var(--bg);
    }
    #status {
      font-size: 11px;
      color: var(--on-surface-2);
      opacity: 0.6;
      font-family: 'Inter', sans-serif;
    }
    .copy-btn {
      display: none;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      font-size: 11px;
      font-family: 'Inter', 'Sarabun', sans-serif;
      font-weight: 500;
      color: var(--on-surface-2);
      background: var(--surface-hi);
      border: none;
      border-radius: 99px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover { color: var(--on-surface); background: var(--surface-top); }

    .input-box {
      background: var(--surface-pure);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 0 0 1px rgba(255,255,255,0.04);
      transition: box-shadow 0.3s, background 0.3s;
    }
    body.light-mode .input-box {
      box-shadow: 0 4px 24px rgba(43,52,55,0.08), 0 0 0 1px var(--outline-var);
    }
    .input-box:focus-within {
      box-shadow: 0 8px 32px rgba(88,86,214,0.15), 0 0 0 1px rgba(88,86,214,0.3);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 14px 18px 8px;
      color: var(--on-surface);
      font-family: 'Inter', 'Sarabun', sans-serif;
      font-size: 14px;
      resize: none;
      line-height: 1.6;
    }
    textarea::placeholder { color: var(--on-surface-2); opacity: 0.4; }

    .input-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 6px 10px;
      gap: 6px;
    }

    .send-btn {
      width: 36px; height: 36px;
      background: var(--primary);
      border: none;
      border-radius: 10px;
      color: var(--on-primary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 4px 12px rgba(88,86,214,0.3);
    }
    .send-btn:hover { background: var(--primary-dim); }
    .send-btn:active { transform: scale(0.92); }
    .send-btn:disabled {
      background: var(--surface-top);
      color: var(--on-surface-2);
      opacity: 0.5;
      cursor: default;
      box-shadow: none;
    }
    .send-btn .material-symbols-outlined { font-size: 18px; }
  </style>
</head>
<body>

<!-- ─── Sidebar ──────────────────────────────────────────────────── -->
<aside class="sidebar">

  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon">
      <span class="material-symbols-outlined" style="font-size:20px">auto_awesome</span>
    </div>
    <div>
      <h2 class="brand-name">AI Assistant</h2>
      <p class="brand-sub">Internal POC</p>
    </div>
  </div>

  <div class="sidebar-body">

    <!-- Agent Active -->
    <div class="section-label">Agent Active</div>
    <div id="agentBadge" class="agent-badge"></div>

    <!-- Use Cases -->
    <div class="section-label">ตัวอย่างงาน</div>

    <button class="nav-item" onclick="fillInput('ร่างสัญญาจ้างพนักงานชื่อ สมชาย ใจดี ตำแหน่ง นักบัญชี เงินเดือน 35,000 บาท')">
      <span class="nav-icon">📄</span><span>ร่างสัญญาจ้าง</span>
    </button>
    <button class="nav-item" onclick="fillInput('สร้าง Job Description สำหรับตำแหน่ง HR Manager')">
      <span class="nav-icon">📋</span><span>สร้าง JD</span>
    </button>
    <button class="nav-item" onclick="fillInput('สร้าง Invoice สำหรับ บริษัท ABC จำกัด ค่าบริการที่ปรึกษา 50,000 บาท')">
      <span class="nav-icon">🧾</span><span>สร้าง Invoice</span>
    </button>
    <button class="nav-item" onclick="fillInput('ร่างอีเมลแจ้งพนักงานเรื่องนโยบาย Work from Home สัปดาห์ละ 2 วัน')">
      <span class="nav-icon">✉️</span><span>ร่างอีเมลนโยบาย</span>
    </button>
    <button class="nav-item" onclick="fillInput('สรุปขั้นตอนการลาป่วยของบริษัท')">
      <span class="nav-icon">💬</span><span>คำถาม HR</span>
    </button>
    <button class="nav-item" onclick="fillInput('ช่วยฉันวางแผนการพูดคุยกับพนักงานที่ส่งงานช้าและขาดงานบ่อย ฉันเป็น Team Lead และต้องการให้ Feedback อย่างสร้างสรรค์')">
      <span class="nav-icon">👥</span><span>Feedback พนักงาน</span>
    </button>

  </div>

  <!-- Footer -->
  <div class="sidebar-footer">
    <button class="theme-btn" onclick="toggleTheme()">
      <span class="material-symbols-outlined" style="font-size:18px">dark_mode</span>
      <span>สลับโหมด</span>
    </button>
    <div class="model-pill">
      <span class="dot"></span>
      <span id="modelName">กำลังโหลด...</span>
    </div>
    <p class="poc-warning">⚠️ POC เท่านั้น — ไม่ใช่ระบบ production</p>
  </div>

</aside>

<!-- ─── Main ─────────────────────────────────────────────────────── -->
<div class="main">

  <!-- Navbar -->
  <header class="navbar">
    <div class="navbar-left">
      <h1 class="app-title">AI Assistant</h1>
      <span class="app-desc">Orchestrator · HR · Accounting · Manager</span>
    </div>
    <div class="navbar-right">
      <span class="version-tag">v0.3.1</span>
    </div>
  </header>

  <!-- Output -->
  <div class="output-wrap">
    <div class="output-container" id="outputContainer">
      <div class="ai-accent-line"></div>
      <div class="output-area" id="output">
        <span class="placeholder">ผลลัพธ์จะแสดงที่นี่<br><br>พิมพ์งานในช่องด้านล่าง หรือคลิกตัวอย่างทางซ้าย</span>
      </div>
    </div>
  </div>

  <!-- Input Footer -->
  <div class="input-footer">
    <div class="input-inner">

      <div class="status-row">
        <span id="status"></span>
        <button id="copyBtn" class="copy-btn" onclick="copyOutput()">
          <span class="material-symbols-outlined" style="font-size:13px">content_copy</span>
          คัดลอก
        </button>
      </div>

      <div class="input-box">
        <textarea
          id="inputMsg"
          rows="2"
          placeholder="พิมพ์งานที่ต้องการ — ระบบจะเลือก Agent ที่เหมาะสมโดยอัตโนมัติ"
        ></textarea>
        <div class="input-actions">
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <span class="material-symbols-outlined">arrow_upward</span>
          </button>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
  function fillInput(text) {
    document.getElementById('inputMsg').value = text;
    document.getElementById('inputMsg').focus();
  }

  let startTime = 0;

  async function sendMessage() {
    const input = document.getElementById('inputMsg');
    const output = document.getElementById('output');
    const status = document.getElementById('status');
    const btn = document.getElementById('sendBtn');
    const badge = document.getElementById('agentBadge');
    const copyBtn = document.getElementById('copyBtn');
    const container = document.getElementById('outputContainer');

    const message = input.value.trim();
    if (!message) return;

    // Reset UI
    startTime = Date.now();
    btn.disabled = true;
    output.innerHTML = '';
    output.classList.remove('md-rendered');
    status.textContent = '⚙️ กำลังวิเคราะห์งาน...';
    badge.style.display = 'none';
    badge.className = 'agent-badge';
    copyBtn.style.display = 'none';
    container.classList.remove('streaming');
    input.value = '';

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });

      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let outputText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let data;
          try { data = JSON.parse(line.slice(6)); } catch { continue; }

          if (data.type === 'status') {
            status.textContent = '⚙️ ' + data.message;

          } else if (data.type === 'agent') {
            const agentMap = {
              hr:         { cls: 'agent-hr',         label: 'HR Agent',         icon: '👤' },
              accounting: { cls: 'agent-accounting',  label: 'Accounting Agent', icon: '📊' },
              manager:    { cls: 'agent-manager',     label: 'Manager Advisor',  icon: '🧭' }
            };
            const info = agentMap[data.agent] || agentMap['hr'];
            badge.className = 'agent-badge ' + info.cls;
            badge.innerHTML = `<strong>${info.icon} ${info.label}</strong><br><span style="opacity:0.8;font-size:11px">${data.reason}</span>`;
            badge.style.display = 'block';
            container.classList.add('streaming');
            status.textContent = `✓ เลือก ${info.label} — กำลังสร้างเอกสาร...`;

          } else if (data.type === 'text') {
            outputText += data.content;
            output.textContent = outputText;
            output.parentElement.parentElement.scrollTop = output.parentElement.parentElement.scrollHeight;

          } else if (data.type === 'done') {
            output.innerHTML = marked.parse(outputText);
            output.classList.add('md-rendered');
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            const tokenCount = outputText.length.toLocaleString('th-TH');
            status.textContent = `✅ เสร็จสิ้น · ${elapsed} วินาที · ${tokenCount} tokens`;
            container.classList.remove('streaming');
            copyBtn.style.display = 'flex';
            btn.disabled = false;

          } else if (data.type === 'error') {
            output.innerHTML = `<span class="error-msg">❌ เกิดข้อผิดพลาด: ${data.message}</span>`;
            status.textContent = 'กรุณาลองใหม่อีกครั้ง';
            container.classList.remove('streaming');
            btn.disabled = false;
          }
        }
      }
    } catch (err) {
      output.innerHTML = `<span class="error-msg">❌ ไม่สามารถเชื่อมต่อ server ได้: ${err.message}</span>`;
      status.textContent = 'กรุณาตรวจสอบว่า Flask server รันอยู่ที่ port 5000';
      container.classList.remove('streaming');
      btn.disabled = false;
    }
  }

  function copyOutput() {
    const text = document.getElementById('output').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      const orig = btn.innerHTML;
      btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:13px">check</span> คัดลอกแล้ว';
      setTimeout(() => btn.innerHTML = orig, 2000);
    });
  }

  // Enter to send, Shift+Enter for newline
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('inputMsg').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    fetch('/api/health')
      .then(res => res.json())
      .then(data => {
        if (data.model) document.getElementById('modelName').textContent = data.model;
      })
      .catch(() => {
        document.getElementById('modelName').textContent = 'ไม่สามารถโหลดได้';
      });
  });

  function toggleTheme() {
    document.body.classList.toggle('light-mode');
    const isLight = document.body.classList.contains('light-mode');
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
  }

  if (localStorage.getItem('theme') === 'light') {
    document.body.classList.add('light-mode');
  }
</script>

</body>
</html>
