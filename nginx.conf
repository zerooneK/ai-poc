# ─── Nginx Reverse Proxy Config — AI Assistant POC ───────────────────────────
# วิธีใช้:
#   sudo cp nginx.conf /etc/nginx/sites-available/ai-poc
#   sudo ln -s /etc/nginx/sites-available/ai-poc /etc/nginx/sites-enabled/ai-poc
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;   # รับทุก domain/IP — เปลี่ยนเป็น domain จริงถ้ามี

    # ─── SSE Streaming (สำคัญมาก) ────────────────────────────────────────────
    # /api/chat และ /api/files/stream ใช้ SSE — ต้องปิด buffering
    location ~ ^/api/(chat|files/stream) {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # ปิด buffering — ถ้าเปิดอยู่ SSE จะไม่ส่ง token ถึง browser จนกว่า buffer จะเต็ม
        proxy_buffering    off;
        proxy_cache        off;

        # Timeout ต้องมากกว่า GUNICORN_TIMEOUT (120s) เพื่อรองรับ AI response ยาวๆ
        proxy_read_timeout    130s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    130s;

        # Headers สำหรับ SSE
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        '';   # ป้องกัน nginx ตัด keep-alive

        # บอก gunicorn ว่าไม่ควร buffer SSE response
        add_header X-Accel-Buffering no;
    }

    # ─── General API & Static ─────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Security Headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-XSS-Protection       "1; mode=block";

    # ─── Upload size limit ────────────────────────────────────────────────────
    # pending_doc สูงสุด 200KB + overhead
    client_max_body_size 1m;

    # ─── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/ai-poc.access.log;
    error_log  /var/log/nginx/ai-poc.error.log warn;
}
